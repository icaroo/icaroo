    I spent a lot of my free time as a committee member of the [*CatiJr*](https://www2.ufscar.br/estudante/empresas-juniores) taking on roles such as *Project Manager*.During 1 year I was responsible to negotiate projects with clients, gathering the requirement , managing 3 different teams, also, hands-on on the projects when necessary.
